<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lenior 2.0 — Assistente de Samuel</title>

    <!-- ============ CSS ============ -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 820px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 28px 30px 34px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6);
            transition: all 0.2s;
        }

        /* cabeçalho */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #f0f3fa;
            letter-spacing: -0.3px;
        }

        .header .badge {
            background: #2b8c5e;
            color: #d4f5e3;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            border: 1px solid rgba(43, 140, 94, 0.4);
        }

        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9aa5c1;
            font-size: 14px;
        }

        .status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2b8c5e;
            display: inline-block;
            box-shadow: 0 0 8px #2b8c5e88;
        }

        /* área de mensagens */
        .chat-box {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 20px;
            padding: 18px 20px 10px;
            max-height: 440px;
            min-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 5px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #3e4a66;
            border-radius: 10px;
        }

        .msg {
            padding: 12px 18px;
            border-radius: 18px;
            margin-bottom: 12px;
            max-width: 86%;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            animation: fadeUp 0.25s ease;
        }

        .msg.user {
            background: #2b3b5c;
            color: #e8edf9;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .msg.lenior {
            background: #1e293b;
            color: #e2eaf6;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #2b8c5e;
        }

        .msg.error {
            background: #3f2020;
            color: #ffbaba;
            border-left: 3px solid #cf3e3e;
        }

        .msg strong {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .msg pre {
            background: #0f131f;
            padding: 12px 14px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 13px;
            color: #b7c9e5;
            margin-top: 8px;
            border: 1px solid #2a3650;
        }

        /* áudio player */
        .msg audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 30px;
            outline: none;
        }

        /* entrada */
        .input-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-area input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 14px 20px;
            border-radius: 40px;
            border: 1px solid #31415e;
            background: #111827;
            color: #eef3fc;
            font-size: 15px;
            transition: 0.2s;
            outline: none;
        }

        .input-area input[type="text"]:focus {
            border-color: #3b9b6e;
            box-shadow: 0 0 0 3px #2b8c5e33;
        }

        .input-area input[type="text"]::placeholder {
            color: #68738b;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            background: #2b8c5e;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            border: 1px solid #3b9b6e55;
        }

        .btn:hover {
            background: #34a06e;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #4d5f7e;
            color: #c8d2e6;
        }

        .btn-outline:hover {
            background: #1e2a40;
            border-color: #6b7fa3;
        }

        .btn-danger {
            background: #a13737;
            border-color: #a1373780;
        }
        .btn-danger:hover {
            background: #bf4040;
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* loading */
        .loader {
            display: none;
            color: #9aa5c1;
            font-size: 14px;
            padding: 10px 0 4px 6px;
            gap: 10px;
            align-items: center;
        }

        .loader .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #2b3b5c;
            border-top-color: #2b8c5e;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        /* responsivo */
        @media (max-width: 600px) {
            .container {
                padding: 18px 16px 24px;
            }
            .header h1 {
                font-size: 20px;
            }
            .msg {
                max-width: 94%;
                font-size: 14px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- cabeçalho -->
        <div class="header">
            <h1>🧠 Lenior 2.0</h1>
            <span class="badge">Samuel</span>
            <div class="status">
                <span class="dot"></span>
                <span id="statusText">Online</span>
            </div>
        </div>

        <!-- mensagens -->
        <div class="chat-box" id="chatBox">
            <!-- as mensagens são inseridas aqui via JavaScript -->
        </div>

        <!-- loader -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span id="loaderText">Processando...</span>
        </div>

        <!-- entrada -->
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Digite sua mensagem..." />
            <button class="btn" id="sendBtn">➤ Enviar</button>
            <button class="btn btn-outline" id="micBtn">🎤 Falar</button>
            <button class="btn btn-outline btn-danger" id="stopBtn" style="display:none;">⏹ Parar</button>
        </div>

        <!-- ações extras -->
        <div class="footer-actions">
            <button class="btn btn-outline" id="clearBtn" style="font-size:12px; padding:6px 14px;">🗑 Limpar</button>
            <span style="color:#4d5f7e; font-size:13px; margin-left:auto; align-self:center;">
                sessão: <span id="sessionDisplay">—</span>
            </span>
        </div>
    </div>

    <!-- ============ JAVASCRIPT ============ -->
    <script>
        (function() {
            'use strict';

            // ===== CONFIGURAÇÃO =====
            const API_BASE = 'https://lenior-api-1-hvvj.onrender.com';
            const AUDIO_ENDPOINT = API_BASE + '/chat/audio';
            const TEXT_ENDPOINT = API_BASE + '/chat/texto';

            // ===== DOM =====
            const chatBox = document.getElementById('chatBox');
            const msgInput = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendBtn');
            const micBtn = document.getElementById('micBtn');
            const stopBtn = document.getElementById('stopBtn');
            const clearBtn = document.getElementById('clearBtn');
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const statusText = document.getElementById('statusText');
            const sessionDisplay = document.getElementById('sessionDisplay');

            // ===== ESTADO =====
            let sessaoId = localStorage.getItem('lenior_session') || null;
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;

            // ===== FUNÇÕES AUXILIARES =====

            function atualizarStatus(online) {
                statusText.textContent = online ? 'Online' : 'Offline';
                document.querySelector('.dot').style.background = online ? '#2b8c5e' : '#a13737';
            }

            function mostrarLoader(texto) {
                loader.style.display = 'flex';
                loaderText.textContent = texto || 'Processando...';
            }

            function esconderLoader() {
                loader.style.display = 'none';
            }

            function adicionarMensagem(remetente, conteudo, extra) {
                const div = document.createElement('div');
                div.className = 'msg ' + (remetente === 'você' ? 'user' : remetente === 'erro' ? 'error' : 'lenior');

                const strong = document.createElement('strong');
                strong.textContent = remetente === 'você' ? 'Você' : remetente === 'erro' ? 'Erro' : 'Lenior';
                div.appendChild(strong);

                const textNode = document.createElement('span');
                textNode.innerHTML = conteudo.replace(/\n/g, '<br>');
                div.appendChild(textNode);

                if (extra && extra.audio) {
                    const audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = 'data:audio/wav;base64,' + extra.audio;
                    div.appendChild(audio);
                }

                if (extra && extra.execucao) {
                    const pre = document.createElement('pre');
                    pre.textContent = '🧪 Execução:\n' + JSON.stringify(extra.execucao, null, 2);
                    div.appendChild(pre);
                }

                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function adicionarErro(mensagem) {
                const div = document.createElement('div');
                div.className = 'msg error';
                const strong = document.createElement('strong');
                strong.textContent = 'Erro';
                div.appendChild(strong);
                const span = document.createElement('span');
                span.textContent = mensagem;
                div.appendChild(span);
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function limparChat() {
                chatBox.innerHTML = '';
                adicionarMensagem('Lenior', 'Olá Samuel! Sou a Lenior 2.0. Como posso ajudar você hoje?', null);
            }

            // ===== CHAMADAS À API =====

            async function enviarTexto(texto) {
                if (!texto || texto.trim() === '') return;
                const msg = texto.trim();
                adicionarMensagem('você', msg, null);
                msgInput.value = '';
                mostrarLoader('Pensando...');

                try {
                    const payload = { texto: msg };
                    if (sessaoId) payload.sessao_id = sessaoId;

                    const resp = await fetch(TEXT_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!resp.ok) {
                        const erroBody = await resp.text();
                        throw new Error(`HTTP ${resp.status} — ${erroBody}`);
                    }

                    const data = await resp.json();
                    if (data.sessao_id) {
                        sessaoId = data.sessao_id;
                        localStorage.setItem('lenior_session', sessaoId);
                        sessionDisplay.textContent = sessaoId.slice(0, 12) + '…';
                    }

                    adicionarMensagem('Lenior', data.texto || '(resposta vazia)', {
                        audio: data.audio || null,
                        execucao: data.execucao || null
                    });

                } catch (err) {
                    adicionarErro('Falha na API: ' + err.message);
                    console.error(err);
                } finally {
                    esconderLoader();
                }
            }

            // ===== ÁUDIO =====

            async function enviarAudio(blob) {
                mostrarLoader('Transcrevendo áudio...');
                const formData = new FormData();
                formData.append('audio', blob, 'gravacao.mp3');
                if (sessaoId) formData.append('sessao_id', sessaoId);

                try {
                    const resp = await fetch(AUDIO_ENDPOINT, {
                        method: 'POST',
                        body: formData
                    });

                    if (!resp.ok) {
                        const erroBody = await resp.text();
                        throw new Error(`HTTP ${resp.status} — ${erroBody}`);
                    }

                    const data = await resp.json();
                    if (data.sessao_id) {
                        sessaoId = data.sessao_id;
                        localStorage.setItem('lenior_session', sessaoId);
                        sessionDisplay.textContent = sessaoId.slice(0, 12) + '…';
                    }

                    adicionarMensagem('Lenior', data.texto || '(resposta vazia)', {
                        audio: data.audio || null,
                        execucao: data.execucao || null
                    });

                } catch (err) {
                    adicionarErro('Falha no áudio: ' + err.message);
                    console.error(err);
                } finally {
                    esconderLoader();
                }
            }

            // ===== GRAVAÇÃO =====

            function iniciarGravacao() {
                if (isRecording) return;
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then((stream) => {
                        mediaRecorder = new MediaRecorder(stream);
                        audioChunks = [];
                        mediaRecorder.ondataavailable = (e) => {
                            if (e.data.size > 0) audioChunks.push(e.data);
                        };
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                            if (blob.size > 0) {
                                enviarAudio(blob);
                            } else {
                                adicionarErro('Nenhum áudio gravado.');
                            }
                            isRecording = false;
                            micBtn.style.display = 'inline-flex';
                            stopBtn.style.display = 'none';
                            stream.getTracks().forEach(t => t.stop());
                        };
                        mediaRecorder.start();
                        isRecording = true;
                        micBtn.style.display = 'none';
                        stopBtn.style.display = 'inline-flex';
                        mostrarLoader('Gravando...');
                    })
                    .catch((err) => {
                        adicionarErro('Não foi possível acessar o microfone: ' + err.message);
                        console.error(err);
                    });
            }

            function pararGravacao() {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                } else {
                    isRecording = false;
                    micBtn.style.display = 'inline-flex';
                    stopBtn.style.display = 'none';
                    esconderLoader();
                }
            }

            // ===== EVENTOS =====

            sendBtn.addEventListener('click', () => {
                enviarTexto(msgInput.value);
            });

            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    enviarTexto(msgInput.value);
                }
            });

            micBtn.addEventListener('click', iniciarGravacao);
            stopBtn.addEventListener('click', pararGravacao);

            clearBtn.addEventListener('click', () => {
                if (confirm('Limpar todas as mensagens?')) {
                    limparChat();
                }
            });

            // ===== INICIALIZAÇÃO =====

            function init() {
                fetch(API_BASE)
                    .then((r) => {
                        if (r.ok) {
                            atualizarStatus(true);
                        } else {
                            atualizarStatus(false);
                        }
                    })
                    .catch(() => atualizarStatus(false));

                if (sessaoId) {
                    sessionDisplay.textContent = sessaoId.slice(0, 12) + '…';
                }

                limparChat();
                msgInput.focus();
            }

            init();

        })();
    </script>
</body>
</html>
